<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} — TopAI Real Estate Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p.sub { color: #667; font-size: 14px; margin-bottom: 24px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #556; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    input { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e4ed; border-radius: 7px; font-size: 14px; }
    input:focus { outline: none; border-color: #4f8ef7; }
    .btn { width: 100%; padding: 12px; background: #4f8ef7; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #3a7de0; }
    .error { background: #fff5f5; border: 1.5px solid #fca5a5; color: #dc2626; border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-bottom: 14px; }
    .footer { margin-top: 20px; font-size: 13px; color: #667; text-align: center; }
    a { color: #4f8ef7; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{ title }}</h1>
    <p class="sub">AI-powered content for real estate agents</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="{{ 'new-password' if show_confirm else 'current-password' }}" required />
      </div>
      {% if show_confirm %}
      <div class="form-group">
        <label for="confirm_password">Confirm password</label>
        <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required />
      </div>
      {% endif %}
      <button class="btn" type="submit">{{ submit_label }}</button>
    </form>
    <p class="footer">{{ footer_text|safe }}</p>
  </div>
</body>
</html>
